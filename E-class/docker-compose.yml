services:
  postgres:
    image: postgres:17-alpine
    container_name: shoe-shop-db
    environment:
      POSTGRES_DB: shoe-shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shoe-shop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./e-commerce-backend
    container_name: shoe-shop-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shoe-shop
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_DEFER_DATASOURCE_INITIALIZATION: "true"
      SPRING_SQL_INIT_MODE: always
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./e-commerce-frontend
    container_name: shoe-shop-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./e-commerce-frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
